<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Kalari Village</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Admin Login</h2>
    <form id="loginForm">
        <input type="password" id="password" placeholder="Enter Admin Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        const pass = document.getElementById('password').value;
        // Simple client-side check (Note: For real security, use a server-side session)
        if (pass === "Kalari2026") { 
            localStorage.setItem("isAdmin", "true");
            window.location.href = "index.html"; 
        } else {
            alert("Invalid Password!");
        }
    };
</script>

</body>
</html>
